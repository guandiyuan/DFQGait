data_cfg:
  dataset_name: CASIA-Bps
  dataset_partition: ./misc/partitions/CASIA-B.json
  dataset_root:
    silhouette_root: E:\he_gait_recognization\OpenGait\datasets\CASIA-B-pklpklpkl
    smpl_root: E:\he_gait_recognization\DFQGait\Dataset\CASIAB\CASIA-B_HRNet
  num_workers: 1
#  cache: True
  remove_no_gallery: false
  test_dataset_name: CASIA-B
  
evaluator_cfg:
  enable_float16: true
  eval_func: identification
  metric: euc
  restore_ckpt_strict: true
  restore_hint: 45000
  sampler:
    batch_shuffle: false
    batch_size: 1
    frames_all_limit: 720
    plus_smpl: true
    sample_type: all_ordered
  save_name: DFQGaitGait
  transform:
  - type: BaseSilTransform

loss_cfg:
- log_prefix: triplet
  loss_term_weight: 1.0
  margin: 0.2
  type: TripletLoss
  work_iteration: 0

model_cfg:
  hidden_dim: 256
  k : 3
  set_in_channels_img : 1
  set_in_channels_ske : 3
  set_channels : [32, 64, 128]
  model: DFQGaitGait
  part_img: 16
  part_ske: 17


optimizer_cfg:
  lr: 0.0001
  momentum: 0.9
  solver: Adam
  weight_decay: 0
scheduler_cfg:
  gamma: 0.1
  milestones:
  - 40000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true
  fix_BN: false
  log_iter: 100
  restore_ckpt_strict: true
  restore_hint: 0
  sampler:
    batch_shuffle: true
    batch_size:
    - 8
    - 8
    frames_num_fixed: 60
    frames_skip_num: 0
    plus_smpl: true
    sample_type: fixed_ordered
    type: TripletSampler
  save_iter: 100
  save_name: DFQGaitGait
  sync_BN: true
  total_iter: 80000
  transform:
  - type: BaseSilTransform
